name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # GITHUB_TOKEN pushes don't trigger `on: push`, so the bot workflows
  # below would otherwise commit to main without redeploying Pages.
  workflow_run:
    workflows:
      - "Update publications"
      - "Refresh Scholar citations (biweekly)"
      - "Discover awards (weekly)"
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # When triggered by workflow_run, only deploy if the upstream run
    # actually succeeded — a Scholar captcha or DBLP outage shouldn't
    # spawn a no-op redeploy. push/dispatch triggers always deploy.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
