# Venue classification sources.
#
# Conferences are ranked against CORE (data/core_rankings.csv):
#   inproceedings whose CORE rank is "A*" or "A"  →  a_star_conf
#   anything else (or no CORE entry)              →  other_conf
#
# Journals are ranked against Scimago (data/scimago_journal_rank.csv):
#   article whose ISSN resolves to Q1 in any Computer Science subject
#   category → q1_journal; anything else → other_journal.
#
# Workshops (booktitle contains "workshop" or the "X@Y" satellite-event
# shorthand) and preprints (CoRR/arXiv, publtype="informal") are
# detected before ranking lookup and are never promoted to A*/Q1.
#
# Refreshing the ranking data:
#   CORE    → curl 'https://portal.core.edu.au/conf-ranks/?search=&by=all&source=CORE2023&sort=atitle&page=1&do=Export' -o data/core_rankings.csv
#   Scimago → download from https://www.scimagojr.com/journalrank.php (button "Download data"),
#             save as data/scimago_journal_rank.csv (semicolon-separated, UTF-8).

# DBLP venue abbreviation → CORE acronym.
# Only needed when the CORE acronym differs from the uppercased DBLP
# abbrev (which is the default lookup key). Leave this empty for the
# common case where DBLP "sigir" matches CORE "SIGIR".
conference_core_acronym:
  nips:  NeurIPS       # DBLP uses the legacy key; CORE2023 lists "NeurIPS"
  pvldb: VLDB          # PVLDB proceedings are ranked as VLDB in CORE
  webi:  WI            # Web Intelligence

# DBLP venue abbreviation → ISSN(s). A journal not listed here can
# never be classified Q1, even if Scimago would rank it so — the ISSN
# is the join key against data/scimago_journal_rank.csv. Multiple ISSNs
# are allowed; any match counts. Hyphens are ignored during matching.
journal_issn:
  # ACM Transactions
  tois:        ["1046-8188", "1558-2868"]   # ACM Trans. on Information Systems
  tors:        ["2770-6699"]                # ACM Trans. on Recommender Systems
  tist:        ["2157-6904", "2157-6912"]   # ACM Trans. on Intelligent Systems and Technology
  tkdd:        ["1556-4681", "1556-472X"]   # ACM Trans. on Knowledge Discovery from Data
  tweb:        ["1559-1131", "1559-114X"]   # ACM Trans. on the Web
  cacm:        ["0001-0782", "1557-7317"]   # Communications of the ACM
  # IEEE Transactions
  tkde:        ["1041-4347", "1558-2191"]   # IEEE Trans. Knowledge and Data Engineering
  tpami:       ["0162-8828", "1939-3539"]   # IEEE TPAMI
  tnn:         ["2162-237X", "2162-2388"]   # IEEE TNNLS
  tbd:         ["2332-7790"]                # IEEE Trans. Big Data
  tai:         ["2691-4581"]                # IEEE Trans. Artificial Intelligence
  access:      ["2169-3536"]                # IEEE Access
  # Elsevier
  ipm:         ["0306-4573"]                # Information Processing & Management
  isci:        ["0020-0255"]                # Information Sciences
  ai:          ["0004-3702"]                # Artificial Intelligence
  nn:          ["0893-6080"]                # Neural Networks
  fgcs:        ["0167-739X"]                # Future Generation Computer Systems
  osnm:        ["2468-6964"]                # Online Social Networks and Media
  cmig:        ["0895-6111"]                # Computerized Medical Imaging and Graphics
  # Springer
  datamine:    ["1384-5810", "1573-756X"]   # Data Mining and Knowledge Discovery
  ir:          ["1386-4564", "1573-7659"]   # Information Retrieval Journal
  snam:        ["1869-5450", "1869-5469"]   # Social Network Analysis and Mining
  # Databases
  pvldb:       ["2150-8097"]                # Proc. VLDB Endowment
  vldb:        ["1066-8888", "0949-877X"]   # VLDB Journal
  # ML / AI / NLP open journals
  jmlr:        ["1532-4435", "1533-7928"]   # Journal of Machine Learning Research
  jair:        ["1076-9757", "1943-5037"]   # Journal of Artificial Intelligence Research
  ftir:        ["1554-0669", "1554-0677"]   # Foundations and Trends in IR
  jasis:       ["2330-1635", "2330-1643"]   # JASIST
  tacl:        ["2307-387X"]                # Trans. of the ACL
  cl:          ["0891-2017", "1530-9312"]   # Computational Linguistics
  # General science
  nature:      ["0028-0836", "1476-4687"]
  science:     ["0036-8075", "1095-9203"]
  # Other journals that appear in publications but are unlikely Q1-CS
  # (kept here so the ISSN column is self-documenting; Scimago decides)
  concurrency: ["1532-0626", "1532-0634"]   # Concurrency and Computation
  ercim:       []                            # ERCIM News — magazine, not in Scimago

# Explicit DBLP keys to drop. Use this for one-off non-papers
# (keynotes, invited talks, panels, tutorials, abstracts) whose
# booktitle is the plain conference acronym and whose title doesn't
# match any general skip pattern — there's no automatable signal, so
# list them here. The nightly sync honours this list on every run,
# so one edit keeps the non-paper out of future builds.
skip_keys:
  - conf/www/MantrachS19             # Enlisting the Public... (WWW 2019 — not a paper)
  - conf/cikm/TeodoroGSS25           # "Advances in Medical Knowledge Systems..." — CIKM 2025 tutorial (4 pages)

# Title patterns (case-insensitive regex) for DBLP records to DROP entirely.
# Used to filter out workshop-organizing entries, editorials, and reports
# that DBLP lists as "publications" but are service contributions, not
# research papers. Edit this list to keep or remove entries from the site.
skip_title_patterns:
  - '\bworkshop on\b'           # "... Workshop on X ..."  (organizing a workshop)
  - '\bworkshop report\b'       # "SIGIR workshop report ..."
  - '^report on .* workshop\b'  # "Report on the ... Workshop ..."
  - '\bworkshop$'               # "... Workshop"  (title ending in the workshop name)
  - '^editorial\b'              # "Editorial ..." / "Editorial: ..." / "Editorial — ..."
  - '^guest editorial\b'        # "Guest Editorial ..."
  - '^special issue\b'          # "Special issue on ..." (guest-editor intro, not research)
  - '^preface\b'                # "Preface ..." (volume preface)
  - '^foreword\b'               # "Foreword ..."
  - '^message from\b'           # "Message from the ... Chair", "Message from the Organizers"
  - '^\S+\s*@\s*\w+\d+\b'       # "IR-RAG @ SIGIR24 ...", "RobustRecSys @ RecSys2024 ..."
  - '^[A-Z][A-Z0-9]+\s+\d{4}[:\s]' # "TSMO 2024: ...", "OSNED 2018 Chairs' Welcome ...", "ECIR 2012: ..."
  - "chairs'?\\s+welcome"       # "... Chairs' Welcome ..." (workshop preface)
