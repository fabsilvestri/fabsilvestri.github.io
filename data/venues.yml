# Venue classification for publication list.
#
# Keys are DBLP venue abbreviations — the segment after "conf/" or
# "journals/" in the DBLP record key. For example, a record with
# key="conf/sigir/SmithJ24" has venue abbreviation "sigir".
#
# The fetch_publications.py script reads this file and classifies
# each publication into one of:
#   - "a_star_conf"   (inproceedings whose venue is in a_star_confs)
#   - "q1_journal"    (articles whose venue is in q1_journals)
#   - "preprint"      (CoRR/arXiv, publtype="informal", booktitle contains "workshop")
#   - "other"         (everything else)
#
# Edit the lists below to match your own ranking preferences.

# CORE 2023 rank A* conferences relevant to ML / NLP / IR / DB / Vision.
a_star_confs:
  # Information Retrieval / Web / Data Mining
  - sigir
  - www          # The Web Conference (formerly WWW)
  - kdd
  - wsdm
  - recsys
  # Natural Language Processing
  - acl
  - emnlp
  - naacl
  - eacl
  # Machine Learning / AI
  - icml
  - nips         # legacy NeurIPS key
  - neurips
  - iclr
  - aaai
  - ijcai
  - uai
  - aistats
  - colt
  # Computer Vision
  - cvpr
  - iccv
  - eccv
  # Databases / Systems
  - sigmod
  - vldb
  - icde
  - pods

# Q1 journals — Scimago SJR Q1 in at least one Computer Science category.
q1_journals:
  - tois         # ACM Trans. on Information Systems
  - tors         # ACM Trans. on Recommender Systems
  - tist         # ACM Trans. on Intelligent Systems and Technology
  - tkdd         # ACM Trans. on Knowledge Discovery from Data
  - tweb         # ACM Trans. on the Web
  - cacm         # Communications of the ACM
  - tkde         # IEEE Trans. on Knowledge and Data Engineering
  - tpami        # IEEE Trans. on Pattern Analysis and Machine Intelligence
  - tnn          # IEEE Trans. on Neural Networks and Learning Systems
  - tbd          # IEEE Trans. on Big Data
  - tai          # IEEE Trans. on Artificial Intelligence
  - access       # IEEE Access
  - ipm          # Information Processing & Management (Elsevier)
  - isci         # Information Sciences (Elsevier)
  - ai           # Artificial Intelligence (Elsevier)
  - nn           # Neural Networks (Elsevier)
  - fgcs         # Future Generation Computer Systems (Elsevier)
  - datamine     # Data Mining and Knowledge Discovery (Springer)
  - ir           # Information Retrieval Journal (Springer)
  - pvldb        # Proc. of the VLDB Endowment
  - vldb         # VLDB Journal
  - jmlr         # Journal of Machine Learning Research
  - jair         # Journal of Artificial Intelligence Research
  - ftir         # Foundations and Trends in Information Retrieval
  - jasis        # JASIST
  - tacl         # Trans. of the ACL
  - cl           # Computational Linguistics
  - nature
  - science

# Title patterns (case-insensitive regex) for DBLP records to DROP entirely.
# Used to filter out workshop-organizing entries, editorials, and reports
# that DBLP lists as "publications" but are service contributions, not
# research papers. Edit this list to keep or remove entries from the site.
# Explicit DBLP keys to drop. Use this for one-off non-papers (invited
# talks, panels, keynotes, abstracts) whose titles look like regular
# research papers and therefore don't match any general pattern.
skip_keys:
  - conf/www/MantrachS19  # "Enlisting the Public to Build a Healthier Web Information Commons" (WWW 2019 — not a paper)

skip_title_patterns:
  - '\bworkshop on\b'           # "... Workshop on X ..."  (organizing a workshop)
  - '\bworkshop report\b'       # "SIGIR workshop report ..."
  - '^report on .* workshop\b'  # "Report on the ... Workshop ..."
  - '\bworkshop$'               # "... Workshop"  (title ending in the workshop name)
  - '^editorial\b'              # "Editorial ..." / "Editorial: ..." / "Editorial — ..."
  - '^\S+\s*@\s*\w+\d+\b'       # "IR-RAG @ SIGIR24 ...", "RobustRecSys @ RecSys2024 ..."
  - '^[A-Z][A-Z0-9]+\s+\d{4}[:\s]' # "TSMO 2024: ...", "OSNED 2018 Chairs' Welcome ...", "ECIR 2012: ..."
  - "chairs'?\\s+welcome"       # "... Chairs' Welcome ..." (workshop preface)
